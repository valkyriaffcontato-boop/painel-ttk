<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTK BRASIL | Gestão Suprema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Rajdhani:wght@600;700&family=Inter:wght@400;700&display=swap');
        
        :root { --gold: #eab308; --bg: #020617; --card: #0f172a; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f1f5f9; }
        h1, h2, .font-heading { font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-style: italic; }
        
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(234, 179, 8, 0.1); }
        .btn-gold { 
            background: linear-gradient(135deg, #facc15 0%, #a16207 100%); 
            color: #000; font-weight: 900; transition: 0.3s ease;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(234, 179, 8, 0.4); }
        
        .tab-btn { font-family: 'Rajdhani', sans-serif; font-size: 14px; letter-spacing: 2px; color: #64748b; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--gold); border-color: var(--gold); }
        
        .text-glow-red { color: var(--danger); text-shadow: 0 0 8px rgba(239, 68, 68, 0.5); font-weight: 800; }
        .badge-ban { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); font-size: 10px; font-weight: 900; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-5xl tracking-tighter text-white">TTK <span class="text-yellow-500">BRASIL</span></h1>
                <p class="text-slate-500 font-bold tracking-[0.5em] text-[10px] mt-2">SISTEMA DE GESTÃO DE ELITE</p>
            </div>
            <button onclick="fetchAll()" class="btn-gold px-12 py-4 rounded-full flex items-center gap-3">
                <i class="fas fa-sync-alt"></i> ATUALIZAR SISTEMA
            </button>
        </header>

        <!-- Navegação -->
        <nav class="flex gap-10 mb-10 border-b border-white/5 overflow-x-auto no-scrollbar pb-1">
            <button onclick="showTab('ranking')" id="btn-ranking" class="tab-btn active uppercase">Guerreiros Ativos</button>
            <button onclick="showTab('avisos')" id="btn-avisos" class="tab-btn uppercase">Avisos da Liderança</button>
            <button onclick="showTab('banidos')" id="btn-banidos" class="tab-btn uppercase">Mural de Expulsão</button>
        </nav>

        <!-- ABA RANKING -->
        <div id="tab-ranking" class="glass rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-black/40 text-slate-500 text-[10px] uppercase font-black tracking-widest">
                        <tr>
                            <th class="p-6">#</th>
                            <th class="p-6">Nome</th>
                            <th class="p-6 text-center">Honra</th>
                            <th class="p-6 text-center">Guerra</th>
                            <th class="p-6">Status</th>
                            <th class="p-6 text-right">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="table-ranking" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>

        <!-- ABA AVISOS -->
        <div id="tab-avisos" class="hidden space-y-6">
            <div class="glass p-8 rounded-3xl">
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="aviso-msg" placeholder="Digite o comunicado oficial..." class="flex-1 bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-yellow-500 transition">
                    <button onclick="postarAviso()" class="btn-gold px-12 py-4 rounded-2xl">POSTAR NO DISCORD</button>
                </div>
            </div>
            <div id="lista-avisos" class="grid gap-4"></div>
        </div>

        <!-- ABA BANIDOS -->
        <div id="tab-banidos" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <!-- MODAL BAN (MOVE O MEMBRO) -->
    <div id="modal-ban" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50 backdrop-blur-xl">
        <div class="glass max-w-md w-full p-10 rounded-[2.5rem] border-red-500/20">
            <h2 class="text-3xl font-black text-red-500 italic mb-2">BANIMENTO</h2>
            <p class="text-slate-500 text-xs font-bold uppercase mb-8">Confirmar expulsão do soldado</p>
            <div class="space-y-6">
                <div class="bg-red-500/5 p-4 rounded-2xl border border-red-500/10 text-center">
                    <p id="ban-nick" class="text-2xl font-black uppercase text-white tracking-tighter">-</p>
                    <input type="hidden" id="ban-id-ref">
                </div>
                <input type="text" id="ban-motivo" placeholder="Motivo da saída..." class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none text-white">
                <div class="flex gap-4">
                    <button onclick="closeBan()" class="flex-1 font-bold text-slate-500 uppercase text-xs">Cancelar</button>
                    <button onclick="confirmarBan()" class="flex-1 bg-red-600 text-white font-black py-4 rounded-2xl uppercase text-xs">CONFIRMAR BAN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://docrdiftmbozveolevec.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvY3JkaWZ0bWJvenZlb2xldmVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTA5NjcsImV4cCI6MjA4OTA4Njk2N30.lutrywrjLsaF2sSUFOqTiC75ZrscHsrQ9KOlR-vuXkU';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let membros = [], avisos = [], banidos = [];

        async function fetchAll() {
            const { data: m } = await sb.from('membros').select('*').order('honra', { ascending: false });
            const { data: a } = await sb.from('avisos').select('*').order('id', { ascending: false });
            const { data: b } = await sb.from('banidos').select('*').order('id', { ascending: false });
            membros = m || []; avisos = a || []; banidos = b || [];
            render();
        }

        function isBannable(status) {
            if(!status) return false;
            const s = status.toUpperCase();
            const safe = ["JOGANDO", "ONLINE", "ON-LINE", "NA EQUIPE", "MINUTO", "HORA"];
            return !safe.some(word => s.includes(word));
        }

        function render() {
            const body = document.getElementById('table-ranking');
            body.innerHTML = '';
            membros.forEach((m, i) => {
                const low = m.honra < 5000 || m.guerra < 150;
                const ban = isBannable(m.status);
                body.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition">
                        <td class="p-6 font-black text-slate-800 text-xl">#${i+1}</td>
                        <td class="p-6 font-bold ${low ? 'text-glow-red' : ''}">${m.nome}</td>
                        <td class="p-6 text-center font-mono font-bold text-yellow-500">${m.honra.toLocaleString()}</td>
                        <td class="p-6 text-center font-mono font-bold text-green-500">${m.guerra}</td>
                        <td class="p-6">
                            <span class="text-[10px] font-black uppercase text-slate-500">${m.status || 'Offline'}</span>
                            ${ban ? '<br><span class="badge-ban px-2 py-0.5 rounded uppercase">Pendente</span>' : ''}
                        </td>
                        <td class="p-6 text-right">
                            <button onclick="openBan(${m.id}, '${m.nome}')" class="text-red-900 hover:text-red-500 scale-125"><i class="fas fa-user-slash"></i></button>
                        </td>
                    </tr>`;
            });

            const banDiv = document.getElementById('tab-banidos');
            banDiv.innerHTML = '';
            banidos.forEach(b => {
                banDiv.innerHTML += `<div class="glass p-6 rounded-3xl border-red-500/10 bg-red-500/5">
                    <p class="text-red-500 font-black uppercase text-sm mb-2">${b.nick}</p>
                    <p class="text-xs italic opacity-60">"${b.motivo}"</p>
                </div>`;
            });
        }

        async function confirmarBan() {
            const id = document.getElementById('ban-id-ref').value;
            const nick = document.getElementById('ban-nick').innerText;
            const mot = document.getElementById('ban-motivo').value || "Inatividade";

            await sb.from('banidos').insert([{ nick, motivo: mot, aplicado_por: "Angelo" }]);
            await sb.from('membros').delete().eq('id', id);
            closeBan(); fetchAll();
        }

        function showTab(t) {
            ['ranking', 'avisos', 'banidos'].forEach(tab => {
                document.getElementById(`tab-${tab}`).classList.toggle('hidden', tab !== t);
                document.getElementById(`btn-${tab}`).classList.toggle('active', tab === t);
            });
        }

        function openBan(id, nick) {
            document.getElementById('ban-nick').innerText = nick;
            document.getElementById('ban-id-ref').value = id;
            document.getElementById('modal-ban').classList.remove('hidden');
        }
        function closeBan() { document.getElementById('modal-ban').classList.add('hidden'); }
        fetchAll();
    </script>
</body>
</html>
