<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTK BRASIL | Gestão de Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Rajdhani:wght@600;700&family=Inter:wght@400;700&display=swap');
        :root { --gold: #eab308; --bg: #020617; --card: #0f172a; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f1f5f9; }
        h1, .font-heading { font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(234, 179, 8, 0.1); border-radius: 24px; }
        .btn-gold { background: linear-gradient(135deg, #facc15 0%, #a16207 100%); color: #000; font-weight: 900; transition: 0.3s ease; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(234, 179, 8, 0.3); }
        .tab-btn { font-family: 'Rajdhani', sans-serif; font-size: 14px; letter-spacing: 2px; color: #64748b; border-bottom: 2px solid transparent; transition: 0.3s; padding-bottom: 8px; }
        .tab-btn.active { color: var(--gold); border-color: var(--gold); }
        .text-danger { color: var(--danger) !important; font-weight: 800; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-5xl tracking-tighter text-white">TTK <span class="text-yellow-500">BRASIL</span></h1>
                <p class="text-slate-500 font-bold tracking-[0.4em] text-[10px] mt-2 italic">Supreme Management Panel</p>
            </div>
            <button onclick="fetchAll()" class="btn-gold px-12 py-4 rounded-2xl flex items-center gap-3">
                <i class="fas fa-sync-alt"></i> ATUALIZAR DADOS
            </button>
        </header>

        <nav class="flex gap-10 mb-10 border-b border-white/5 overflow-x-auto no-scrollbar">
            <button onclick="showTab('ranking')" id="btn-ranking" class="tab-btn active uppercase">Guerreiros</button>
            <button onclick="showTab('avisos')" id="btn-avisos" class="tab-btn uppercase">Avisos</button>
            <button onclick="showTab('banidos')" id="btn-banidos" class="tab-btn uppercase">Mural de Bans</button>
        </nav>

        <!-- RANKING -->
        <div id="tab-ranking" class="glass overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-black/40 text-slate-500 text-[10px] uppercase font-black tracking-widest">
                        <tr>
                            <th class="p-6">Nick / UID</th>
                            <th class="p-6 text-center">Honra</th>
                            <th class="p-6 text-center">Guerra</th>
                            <th class="p-6">Status</th>
                            <th class="p-6 text-right">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="table-ranking" class="divide-y divide-white/5 font-medium"></tbody>
                </table>
            </div>
        </div>

        <!-- AVISOS -->
        <div id="tab-avisos" class="hidden space-y-6">
            <div class="glass p-8">
                <input type="text" id="aviso-msg" placeholder="Digite o comunicado oficial..." class="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none mb-4">
                <button onclick="postarAviso()" class="btn-gold w-full py-4 rounded-xl">POSTAR NO DISCORD</button>
            </div>
            <div id="lista-avisos" class="grid gap-4"></div>
        </div>

        <!-- BANIDOS -->
        <div id="tab-banidos" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <!-- MODAL BAN -->
    <div id="modal-ban" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50 backdrop-blur-xl">
        <div class="glass max-w-md w-full p-10">
            <h2 class="text-3xl font-black text-red-500 italic mb-8 uppercase">Banimento</h2>
            <div class="space-y-6">
                <div class="bg-red-500/5 p-4 rounded-2xl border border-red-500/10 text-center">
                    <p id="ban-nick" class="text-2xl font-black uppercase text-white tracking-tighter">-</p>
                    <input type="hidden" id="ban-id-ref">
                </div>
                <input type="text" id="ban-motivo" placeholder="Motivo da saída..." class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white outline-none">
                <div class="flex gap-4">
                    <button onclick="closeBan()" class="flex-1 font-bold text-slate-500 uppercase text-xs">Cancelar</button>
                    <button onclick="confirmarBan()" class="flex-1 bg-red-600 text-white font-black py-4 rounded-xl uppercase text-xs">CONFIRMAR BAN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://docrdiftmbozveolevec.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvY3JkaWZ0bWJvenZlb2xldmVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTA5NjcsImV4cCI6MjA4OTA4Njk2N30.lutrywrjLsaF2sSUFOqTiC75ZrscHsrQ9KOlR-vuXkU';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let membros = [], avisos = [], banidos = [];

        async function fetchAll() {
            const { data: m } = await sb.from('membros').select('*').order('honra', { ascending: false });
            const { data: a } = await sb.from('avisos').select('*').order('id', { ascending: false });
            const { data: b } = await sb.from('banidos').select('*').order('id', { ascending: false });
            membros = m || []; avisos = a || []; banidos = b || [];
            render();
        }

        function render() {
            const body = document.getElementById('table-ranking');
            body.innerHTML = '';
            membros.forEach((m, i) => {
                const low = m.honra < 5000 || m.guerra < 150;
                body.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition">
                        <td class="p-6">
                            <div class="font-bold ${low ? 'text-danger' : 'text-white'}">${m.nome}</div>
                            <div class="text-[10px] text-slate-500">ID: ${m.uid || 'Não Cadastrado'}</div>
                        </td>
                        <td class="p-6 text-center font-mono font-bold text-yellow-500">${m.honra || 0}</td>
                        <td class="p-6 text-center font-mono font-bold text-green-500">${m.guerra || 0}</td>
                        <td class="p-6 text-[10px] font-black uppercase text-slate-500">${m.status || 'Offline'}</td>
                        <td class="p-6 text-right">
                            <button onclick="openBan(${m.id}, '${m.nome}')" class="text-red-900 hover:text-red-500 scale-125"><i class="fas fa-user-slash"></i></button>
                        </td>
                    </tr>`;
            });
            // (Restante da lógica de avisos e banidos igual ao anterior)
        }

        async function confirmarBan() {
            const id = document.getElementById('ban-id-ref').value;
            const nick = document.getElementById('ban-nick').innerText;
            const mot = document.getElementById('ban-motivo').value || "Inatividade";
            await sb.from('banidos').insert([{ nick, motivo: mot, aplicado_por: "Liderança" }]);
            await sb.from('membros').delete().eq('id', id);
            closeBan(); fetchAll();
        }

        function showTab(t) {
            ['ranking', 'avisos', 'banidos'].forEach(tab => {
                document.getElementById(`tab-${tab}`).classList.toggle('hidden', tab !== t);
                document.getElementById(`btn-${tab}`).classList.toggle('active', tab === t);
            });
        }
        function openBan(id, nick) { document.getElementById('ban-nick').innerText = nick; document.getElementById('ban-id-ref').value = id; document.getElementById('modal-ban').classList.remove('hidden'); }
        function closeBan() { document.getElementById('modal-ban').classList.add('hidden'); }
        fetchAll();
    </script>
</body>
    </html>
