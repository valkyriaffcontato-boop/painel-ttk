<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTK BRASIL | Gestão de Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600;700&display=swap');
        
        :root {
            --bg-dark: #080a12;
            --card-bg: #111625;
            --danger: #ff4d4d;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e2e8f0; }
        h1, h2, .rank-font { font-family: 'Rajdhani', sans-serif; }

        .glass { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .row-danger { background: linear-gradient(90deg, rgba(255, 77, 77, 0.05) 0%, transparent 100%); }
        .text-danger { color: var(--danger) !important; text-shadow: 0 0 10px rgba(255, 77, 77, 0.3); }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-bold tracking-widest text-white uppercase">TTK <span class="text-amber-500">BRASIL</span></h1>
                <div class="flex items-center gap-2 text-slate-500 text-xs font-bold tracking-tighter">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> SISTEMA DE MONITORAMENTO ATIVO
                </div>
            </div>
            
            <div class="flex flex-wrap justify-center gap-3">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-3 text-slate-500"></i>
                    <input type="text" id="searchInput" onkeyup="filterMembers()" placeholder="Buscar soldado..." 
                           class="bg-slate-800/50 border border-white/5 rounded-lg py-2 pl-10 pr-4 focus:ring-2 focus:ring-amber-500 w-64 outline-none transition-all">
                </div>
                <button onclick="openModal()" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-2 px-6 rounded-lg transition-all flex items-center gap-2 shadow-lg shadow-amber-500/20">
                    <i class="fas fa-plus"></i> NOVO MEMBRO
                </button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-5 rounded-xl border-l-4 border-blue-500">
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">Membros Atuais</p>
                <h3 id="stat-total" class="text-2xl font-bold text-white">0/55</h3>
            </div>
            <div class="glass p-5 rounded-xl border-l-4 border-amber-500">
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">MVP Semanal</p>
                <h3 id="stat-top" class="text-lg font-bold text-amber-500 truncate">-</h3>
            </div>
            <div class="glass p-5 rounded-xl border-l-4 border-red-500">
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">Em Risco (Abaixo Meta)</p>
                <h3 id="stat-risk" class="text-2xl font-bold text-red-500">0</h3>
            </div>
            <div class="glass p-5 rounded-xl border-l-4 border-green-500">
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">Honra Total Guilda</p>
                <h3 id="stat-sum" class="text-2xl font-bold text-white font-mono">0</h3>
            </div>
        </div>

        <!-- Tabela -->
        <div class="glass rounded-2xl overflow-hidden border border-white/5">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-800/80 text-slate-400 text-[10px] uppercase tracking-[0.2em]">
                            <th class="p-4">Rank</th>
                            <th class="p-4">Membro</th>
                            <th class="p-4 text-center">Honra (Meta 5k)</th>
                            <th class="p-4 text-center">Guerra (Meta 150)</th>
                            <th class="p-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="member-table-body" class="divide-y divide-white/5 font-medium">
                        <!-- Conteúdo via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="glass max-w-md w-full p-8 rounded-2xl border border-amber-500/20">
            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-white uppercase tracking-tighter">Ficha do Membro</h2>
            <form id="member-form" class="space-y-4">
                <input type="hidden" id="member-id">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nickname</label>
                    <input type="text" id="name" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 outline-none focus:border-amber-500 text-white">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Honra (Semana)</label>
                        <input type="number" id="points" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 outline-none focus:border-amber-500 text-white">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Pontos de Guerra</label>
                        <input type="number" id="warPoints" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 outline-none focus:border-amber-500 text-white">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="closeModal()" class="flex-1 px-4 py-3 rounded-lg text-slate-400 hover:bg-white/5 transition font-bold uppercase text-xs">Cancelar</button>
                    <button type="submit" class="flex-1 bg-amber-500 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-600 transition uppercase text-xs">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Dados Iniciais com Honra e Guerra (Valores de guerra fictícios para exemplo)
        const initialMembers = [
            { id: 1, name: "JR TRALHA", points: 5531, warPoints: 200 },
            { id: 2, name: "Quebrada133", points: 4670, warPoints: 180 }, // Ficará vermelho (Honra < 5k)
            { id: 3, name: "TTK ANGELLO", points: 4573, warPoints: 120 }, // Ficará vermelho (Honra < 5k e Guerra < 150)
            { id: 4, name: "TTK JOYCE", points: 4513, warPoints: 160 },
            { id: 5, name: "TTK Lirlex", points: 4499, warPoints: 90 },
            { id: 25, name: "Biel calvo (Líder)", points: 1024, warPoints: 300 }
        ];

        let members = JSON.parse(localStorage.getItem('ttk_v3_data')) || initialMembers;

        function renderTable(data = members) {
            const tableBody = document.getElementById('member-table-body');
            data.sort((a, b) => b.points - a.points);
            
            let riskCount = 0;
            tableBody.innerHTML = '';

            data.forEach((m, index) => {
                // LÓGICA DE CORES: Vermelho se Honra < 5000 OU Guerra < 150
                const isUnderGoal = m.points < 5000 || m.warPoints < 150;
                if(isUnderGoal) riskCount++;

                const row = document.createElement('tr');
                row.className = `border-b border-white/5 hover:bg-white/5 transition-colors ${isUnderGoal ? 'row-danger' : ''}`;
                
                row.innerHTML = `
                    <td class="p-4 font-bold rank-font text-slate-600">#${index + 1}</td>
                    <td class="p-4">
                        <div class="font-bold tracking-tight ${isUnderGoal ? 'text-danger' : 'text-white'}">
                            ${m.name}
                            ${isUnderGoal ? '<i class="fas fa-exclamation-triangle ml-1 text-[10px]"></i>' : ''}
                        </div>
                    </td>
                    <td class="p-4 text-center font-mono">
                        <span class="${m.points < 5000 ? 'text-red-400' : 'text-slate-300'}">${m.points.toLocaleString()}</span>
                    </td>
                    <td class="p-4 text-center font-mono">
                        <span class="${m.warPoints < 150 ? 'text-red-400' : 'text-slate-300'}">${m.warPoints}</span>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="editMember(${m.id})" class="p-2 text-slate-500 hover:text-white"><i class="fas fa-pen text-xs"></i></button>
                        <button onclick="deleteMember(${m.id})" class="p-2 text-slate-500 hover:text-red-500"><i class="fas fa-trash text-xs"></i></button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            document.getElementById('stat-risk').innerText = riskCount;
            updateStats();
            localStorage.setItem('ttk_v3_data', JSON.stringify(members));
        }

        function updateStats() {
            const total = members.length;
            const sum = members.reduce((acc, m) => acc + parseInt(m.points), 0);
            const top = members.length > 0 ? [...members].sort((a,b) => b.points - a.points)[0].name : '-';
            
            document.getElementById('stat-total').innerText = `${total}/55`;
            document.getElementById('stat-top').innerText = top;
            document.getElementById('stat-sum').innerText = sum.toLocaleString();
        }

        function filterMembers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = members.filter(m => m.name.toLowerCase().includes(query));
            renderTable(filtered);
        }

        memberForm.onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('member-id').value;
            const name = document.getElementById('name').value;
            const points = parseInt(document.getElementById('points').value);
            const warPoints = parseInt(document.getElementById('warPoints').value);

            if (id) {
                const index = members.findIndex(m => m.id == id);
                members[index] = { ...members[index], name, points, warPoints };
            } else {
                members.push({ id: Date.now(), name, points, warPoints });
            }
            closeModal();
            renderTable();
        };

        function editMember(id) {
            const m = members.find(m => m.id === id);
            document.getElementById('member-id').value = m.id;
            document.getElementById('name').value = m.name;
            document.getElementById('points').value = m.points;
            document.getElementById('warPoints').value = m.warPoints || 0;
            document.getElementById('modal-title').innerText = "Editar Soldado";
            openModal();
        }

        function deleteMember(id) {
            if(confirm('Expulsar membro do sistema?')) {
                members = members.filter(m => m.id !== id);
                renderTable();
            }
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
            document.getElementById('member-form').reset();
            document.getElementById('member-id').value = '';
        }

        renderTable();
    </script>
</body>
</html>
