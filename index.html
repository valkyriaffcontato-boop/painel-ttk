<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTK BRASIL | Gestão Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600;700&display=swap');
        :root { --bg: #06080f; --card: #10141f; --red: #ff3e3e; --amber: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e2e8f0; }
        h1, .rank-font { font-family: 'Rajdhani', sans-serif; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); }
        .text-danger { color: var(--red) !important; text-shadow: 0 0 10px rgba(255, 62, 62, 0.4); }
        .row-danger { background: linear-gradient(90deg, rgba(255, 62, 62, 0.03) 0%, transparent 100%); }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h1 class="text-4xl font-bold tracking-widest text-white">TTK <span class="text-amber-500">BRASIL</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Painel de Controle de Guilda</p>
            </div>
            <div class="flex gap-3">
                <input type="text" id="searchInput" onkeyup="filter()" placeholder="Buscar membro..." class="bg-slate-800 border-none rounded-lg py-2 px-4 focus:ring-2 focus:ring-amber-500 outline-none w-48 md:w-64">
                <button onclick="openModal()" class="bg-amber-500 text-black font-bold py-2 px-4 rounded-lg hover:bg-amber-600 transition">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-4 rounded-xl border-l-4 border-amber-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase">Membros</p>
                <h3 id="stat-count" class="text-2xl font-bold">50/55</h3>
            </div>
            <div class="glass p-4 rounded-xl border-l-4 border-red-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase">Abaixo da Meta</p>
                <h3 id="stat-risk" class="text-2xl font-bold text-red-500">0</h3>
            </div>
            <div class="glass p-4 rounded-xl border-l-4 border-blue-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase">Honra Total</p>
                <h3 id="stat-sum" class="text-2xl font-bold">0</h3>
            </div>
            <div class="glass p-4 rounded-xl border-l-4 border-green-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase">Top 1</p>
                <h3 id="stat-top" class="text-sm font-bold truncate">-</h3>
            </div>
        </div>

        <!-- Tabela -->
        <div class="glass rounded-xl overflow-hidden border border-white/5">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 text-slate-400 text-[10px] uppercase">
                        <tr>
                            <th class="p-4">Rank</th>
                            <th class="p-4">Nickname</th>
                            <th class="p-4 text-center">Honra (5k)</th>
                            <th class="p-4 text-center">Guerra (150)</th>
                            <th class="p-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="glass max-w-md w-full p-6 rounded-2xl">
            <h2 class="text-xl font-bold mb-4">Editar Membro</h2>
            <form id="member-form" class="space-y-4">
                <input type="hidden" id="m-id">
                <input type="text" id="m-name" placeholder="Nome" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg outline-none focus:border-amber-500">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="m-points" placeholder="Honra" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg outline-none">
                    <input type="number" id="m-war" placeholder="Guerra" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg outline-none">
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 text-slate-400 font-bold">CANCELAR</button>
                    <button type="submit" class="flex-1 bg-amber-500 text-black font-bold py-3 rounded-lg">SALVAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // LISTA COMPLETA DOS 50 MEMBROS EXTRAÍDA DAS FOTOS
        const rawData = [
            {n: "JR TRALHA", p: 5531}, {n: "Quebrada133", p: 4670}, {n: "TTK ANGELLO", p: 4573},
            {n: "TTK JOYCE", p: 4513}, {n: "TTK Lirlex", p: 4499}, {n: "Lm hugo", p: 3899},
            {n: "TTK MTX9 444", p: 3792}, {n: "EL BOCHECHA", p: 3759}, {n: "CE Xavier!", p: 3113},
            {n: "TTK CHADAL", p: 2777}, {n: "TTK dom_max", p: 2698}, {n: "(Mestre Icon/Sem nome)", p: 2483},
            {n: "RYANZINNN", p: 2453}, {n: "egocentrismo", p: 2136}, {n: "cearazim", p: 1835},
            {n: "TTK VELAX1", p: 1794}, {n: "TTK ALEX", p: 1666}, {n: "ヅ LUIS", p: 1663},
            {n: "Erick xat", p: 1632}, {n: "pTKing", p: 1484}, {n: "SHARK1", p: 1139},
            {n: "IGG SERRATH", p: 1120}, {n: "BICHA_MUDA", p: 1096}, {n: "BZ Vordex", p: 1065},
            {n: "Biel calvo (Líder)", p: 1024}, {n: "TTK IM LEEX", p: 970}, {n: "L mami", p: 941},
            {n: "Black.444", p: 910}, {n: "UMB Chipotle", p: 854}, {n: "K OROCHI", p: 776},
            {n: "Ellucky", p: 715}, {n: "Tri evilex", p: 622}, {n: "DuallzE FF", p: 447},
            {n: "Bizon xtd", p: 440}, {n: "100% m1014", p: 415}, {n: "(Ícone Vermelho)", p: 410},
            {n: "f Tiago", p: 350}, {n: "ellow", p: 300}, {n: "tk(buteco)", p: 212},
            {n: "MP KOLLUA", p: 195}, {n: "FX RAFA244", p: 130}, {n: "PM GANANCIA", p: 120},
            {n: "XS AngelloTt", p: 100}, {n: "very p3dro", p: 50}, {n: "miss chapeuzinho", p: 0},
            {n: "very Garcia", p: 0}, {n: "BZ nianaxy", p: 0}, {n: "aim hard", p: 0},
            {n: "(Símbolos Japoneses)", p: 0}, {n: "BR Santos!", p: 0}
        ];

        let members = JSON.parse(localStorage.getItem('ttk_final')) || rawData.map((d, i) => ({
            id: i, name: d.n, points: d.p, war: 0 // Guerra começa em 0
        }));

        function render(data = members) {
            const body = document.getElementById('table-body');
            data.sort((a,b) => b.points - a.points);
            body.innerHTML = '';
            let risk = 0;
            let sum = 0;

            data.forEach((m, i) => {
                const isBad = m.points < 5000 || m.war < 150;
                if(isBad) risk++;
                sum += parseInt(m.points);

                body.innerHTML += `
                    <tr class="${isBad ? 'row-danger' : ''} transition-colors">
                        <td class="p-4 rank-font text-slate-600 font-bold">#${i+1}</td>
                        <td class="p-4 font-bold ${isBad ? 'text-danger' : 'text-white'}">${m.name}</td>
                        <td class="p-4 text-center font-mono ${m.points < 5000 ? 'text-red-400' : 'text-amber-500'}">${m.points}</td>
                        <td class="p-4 text-center font-mono ${m.war < 150 ? 'text-red-400' : 'text-green-500'}">${m.war}</td>
                        <td class="p-4 text-right">
                            <button onclick="edit(${m.id})" class="text-slate-500 hover:text-white"><i class="fas fa-edit"></i></button>
                        </td>
                    </tr>
                `;
            });
            
            document.getElementById('stat-count').innerText = `${members.length}/55`;
            document.getElementById('stat-risk').innerText = risk;
            document.getElementById('stat-sum').innerText = sum.toLocaleString();
            document.getElementById('stat-top').innerText = data[0]?.name || '-';
            localStorage.setItem('ttk_final', JSON.stringify(members));
        }

        function filter() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            render(members.filter(m => m.name.toLowerCase().includes(q)));
        }

        function edit(id) {
            const m = members.find(x => x.id == id);
            document.getElementById('m-id').value = m.id;
            document.getElementById('m-name').value = m.name;
            document.getElementById('m-points').value = m.points;
            document.getElementById('m-war').value = m.war;
            openModal();
        }

        document.getElementById('member-form').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('m-id').value;
            const obj = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('m-name').value,
                points: parseInt(document.getElementById('m-points').value),
                war: parseInt(document.getElementById('m-war').value)
            };
            
            if(id) {
                const idx = members.findIndex(x => x.id == id);
                members[idx] = obj;
            } else {
                members.push(obj);
            }
            closeModal();
            render();
        };

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('member-form').reset(); }

        render();
    </script>
</body>
</html>
