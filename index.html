<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTK BRASIL | Painel de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: #0d111a; border: 1px solid rgba(255,255,255,0.05); }
        .text-danger { color: #ff3e3e !important; }
        .tab-active { border-bottom: 2px solid #fbbf24; color: #fbbf24; }
        .badge-ban { background: rgba(255, 62, 62, 0.2); color: #ff3e3e; border: 1px solid #ff3e3e; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-4xl font-black uppercase italic italic">TTK <span class="text-amber-500">BRASIL</span></h1>
            <div class="flex gap-4">
                <button onclick="fetchAll()" class="bg-amber-500 text-black font-bold px-6 py-2 rounded-lg hover:bg-amber-600 transition flex items-center gap-2">
                    <i class="fas fa-sync-alt"></i> ATUALIZAR TUDO
                </button>
            </div>
        </header>

        <!-- Navegação -->
        <nav class="flex gap-8 border-b border-white/10 mb-8 font-bold uppercase text-xs tracking-widest">
            <button onclick="showTab('ranking')" id="btn-ranking" class="pb-4 tab-active">Ranking de Honra</button>
            <button onclick="showTab('avisos')" id="btn-avisos" class="pb-4 text-slate-500">Lista de Avisos</button>
            <button onclick="showTab('banidos')" id="btn-banidos" class="pb-4 text-slate-500">Mural de Banidos</button>
        </nav>

        <!-- ABA: RANKING -->
        <div id="tab-ranking" class="space-y-4">
            <div class="glass rounded-2xl overflow-hidden shadow-2xl">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-900 text-[10px] uppercase text-slate-500 font-bold">
                        <tr>
                            <th class="p-4">#</th>
                            <th class="p-4">Nickname</th>
                            <th class="p-4 text-center">Honra (5k)</th>
                            <th class="p-4 text-center">Guerra (150)</th>
                            <th class="p-4">Status / Alerta</th>
                            <th class="p-4 text-right">Gestão</th>
                        </tr>
                    </thead>
                    <tbody id="table-ranking" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>

        <!-- ABA: AVISOS -->
        <div id="tab-avisos" class="hidden space-y-6">
            <div class="glass p-6 rounded-2xl">
                <h3 class="font-bold mb-4 uppercase text-amber-500">Postar Novo Aviso</h3>
                <div class="flex gap-2">
                    <input type="text" id="aviso-msg" placeholder="Digite o aviso para a guilda..." class="flex-1 bg-slate-900 p-3 rounded-lg outline-none">
                    <select id="aviso-autor" class="bg-slate-900 p-3 rounded-lg outline-none">
                        <option value="TTK ANGELLO">ANGELLO (Líder)</option>
                        <option value="TTK JOYCE">JOYCE (Vice)</option>
                    </select>
                    <button onclick="postarAviso()" class="bg-blue-600 px-6 rounded-lg font-bold">POSTAR</button>
                </div>
            </div>
            <div id="lista-avisos" class="grid gap-4"></div>
        </div>

        <!-- ABA: BANIDOS -->
        <div id="tab-banidos" class="hidden space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="lista-banidos"></div>
        </div>
    </div>

    <!-- Modal Banimento Manual -->
    <div id="modal-ban" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50">
        <div class="glass max-w-md w-full p-8 rounded-2xl">
            <h2 class="text-xl font-black text-red-500 uppercase mb-4 italic">Confirmar Banimento</h2>
            <div class="space-y-4">
                <p class="text-white font-bold">Nick: <span id="ban-nick" class="text-amber-500 text-xl">-</span></p>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase">Aplicado por:</label>
                    <select id="ban-autor" class="w-full bg-slate-800 p-3 rounded-lg mt-1 outline-none">
                        <option value="TTK ANGELLO">TTK ANGELLO</option>
                        <option value="TTK JOYCE">TTK JOYCE</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold uppercase">Motivo do Ban:</label>
                    <input type="text" id="ban-motivo" placeholder="Ex: Inatividade, Modo proibido..." class="w-full bg-slate-800 p-3 rounded-lg mt-1 outline-none">
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="closeBan()" class="flex-1 text-slate-500 font-bold uppercase text-xs">Cancelar</button>
                    <button onclick="confirmarBan()" class="flex-1 bg-red-600 text-white font-bold py-3 rounded-lg uppercase text-xs">EXECUTAR BAN</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Edição Membro -->
    <div id="modal-edit" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50">
        <div class="glass max-w-md w-full p-8 rounded-2xl">
            <h2 class="text-xl font-bold mb-6 text-white uppercase italic" id="edit-nick-title">Membro</h2>
            <form id="edit-form" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="edit-honra" placeholder="Honra" class="bg-slate-800 p-3 rounded-lg text-white outline-none">
                    <input type="number" id="edit-war" placeholder="Guerra" class="bg-slate-800 p-3 rounded-lg text-white outline-none">
                </div>
                <input type="text" id="edit-status" placeholder="Status: Online, Bermuda, 1 dia..." class="w-full bg-slate-800 p-3 rounded-lg text-white uppercase outline-none">
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="closeEdit()" class="flex-1 text-slate-500 font-bold uppercase text-xs">Sair</button>
                    <button type="submit" class="flex-1 bg-amber-500 text-black font-bold py-3 rounded-lg uppercase text-xs">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SB_URL = 'SUA_URL_AQUI';
        const SB_KEY = 'SUA_KEY_AQUI';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let membros = [], avisos = [], banidos = [];

        async function fetchAll() {
            const { data: m } = await sb.from('membros').select('*').order('honra', { ascending: false });
            const { data: a } = await sb.from('avisos').select('*').order('id', { ascending: false });
            const { data: b } = await sb.from('banidos').select('*').order('id', { ascending: false });
            
            if(m) membros = m; if(a) avisos = a; if(b) banidos = b;
            renderAll();
        }

        function isBannable(status) {
            if(!status) return false;
            const s = status.toUpperCase();
            const safe = ["JOGANDO", "ONLINE", "ON-LINE", "NA EQUIPE", "MINUTO", "HORA"];
            return !safe.some(word => s.includes(word));
        }

        function renderAll() {
            // RANKING
            const rankBody = document.getElementById('table-ranking');
            rankBody.innerHTML = '';
            membros.forEach((m, i) => {
                const ban = isBannable(m.status);
                const low = m.honra < 5000 || m.war < 150;
                rankBody.innerHTML += `
                    <tr class="hover:bg-white/5 border-b border-white/5">
                        <td class="p-4 font-bold text-slate-700">#${i+1}</td>
                        <td class="p-4 font-bold ${low ? 'text-danger' : 'text-white'}">${m.nome}</td>
                        <td class="p-4 text-center font-mono ${m.honra < 5000 ? 'text-red-400' : 'text-amber-500'}">${m.honra}</td>
                        <td class="p-4 text-center font-mono ${m.war < 150 ? 'text-red-400' : 'text-green-500'}">${m.war}</td>
                        <td class="p-4">
                            <span class="text-[10px] font-bold uppercase text-slate-500">${m.status || 'Offline'}</span>
                            ${ban ? '<br><span class="badge-ban">PENDENTE BAN</span>' : ''}
                        </td>
                        <td class="p-4 text-right flex justify-end gap-2">
                            <button onclick="openEdit(${m.id})" class="text-slate-500 hover:text-white"><i class="fas fa-edit"></i></button>
                            <button onclick="openBan('${m.nome}')" class="text-red-900 hover:text-red-500"><i class="fas fa-user-slash"></i></button>
                        </td>
                    </tr>
                `;
            });

            // AVISOS
            const avisoDiv = document.getElementById('lista-avisos');
            avisoDiv.innerHTML = '';
            avisos.forEach(a => {
                avisoDiv.innerHTML += `
                    <div class="glass p-4 rounded-xl border-l-4 border-blue-500 relative">
                        <p class="text-white font-medium">${a.mensagem}</p>
                        <p class="text-[9px] text-slate-500 font-bold mt-2 uppercase">Postado por: ${a.autor}</p>
                        <button onclick="deletarAviso(${a.id})" class="absolute top-4 right-4 text-slate-800 hover:text-red-500"><i class="fas fa-times"></i></button>
                    </div>
                `;
            });

            // BANIDOS
            const banDiv = document.getElementById('lista-banidos');
            banDiv.innerHTML = '';
            banidos.forEach(b => {
                banDiv.innerHTML += `
                    <div class="glass p-5 rounded-2xl border border-red-900/30">
                        <h4 class="text-red-500 font-black uppercase text-sm mb-2 italic">NICK: ${b.nick}</h4>
                        <p class="text-xs text-slate-400 font-bold uppercase">Aplicado por: <span class="text-white">${b.aplicado_por}</span></p>
                        <p class="text-xs text-slate-400 font-bold uppercase mt-1">Motivo: <span class="text-white">${b.motivo}</span></p>
                    </div>
                `;
            });
        }

        // FUNÇÕES DE AÇÃO
        async function postarAviso() {
            const msg = document.getElementById('aviso-msg').value;
            const aut = document.getElementById('aviso-autor').value;
            if(!msg) return;
            await sb.from('avisos').insert([{ mensagem: msg, autor: aut }]);
            document.getElementById('aviso-msg').value = '';
            fetchAll();
        }

        async function deletarAviso(id) {
            await sb.from('avisos').delete().eq('id', id);
            fetchAll();
        }

        function openBan(nick) {
            document.getElementById('ban-nick').innerText = nick;
            document.getElementById('modal-ban').classList.remove('hidden');
        }

        async function confirmarBan() {
            const nick = document.getElementById('ban-nick').innerText;
            const aut = document.getElementById('ban-autor').value;
            const mot = document.getElementById('ban-motivo').value || "Inatividade";
            
            await sb.from('banidos').insert([{ nick: nick, aplicado_por: aut, motivo: mot }]);
            // Opcional: Remover da tabela de membros
            // await sb.from('membros').delete().eq('nome', nick);
            
            closeBan();
            fetchAll();
        }

        // NAVEGAÇÃO E MODAIS
        function showTab(t) {
            ['ranking', 'avisos', 'banidos'].forEach(tab => {
                document.getElementById(`tab-${tab}`).classList.add('hidden');
                document.getElementById(`btn-${tab}`).classList.remove('tab-active');
                document.getElementById(`btn-${tab}`).classList.add('text-slate-500');
            });
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('tab-active');
        }

        function openEdit(id) {
            const m = membros.find(x => x.id == id);
            document.getElementById('edit-id').value = m.id;
            document.getElementById('edit-nick-title').innerText = m.nome;
            document.getElementById('edit-honra').value = m.honra;
            document.getElementById('edit-war').value = m.war;
            document.getElementById('edit-status').value = m.status;
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        document.getElementById('edit-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const up = {
                honra: parseInt(document.getElementById('edit-honra').value),
                war: parseInt(document.getElementById('edit-war').value),
                status: document.getElementById('edit-status').value.toUpperCase()
            };
            await sb.from('membros').update(up).eq('id', id);
            closeEdit(); fetchAll();
        };

        function closeBan() { document.getElementById('modal-ban').classList.add('hidden'); }
        function closeEdit() { document.getElementById('modal-edit').classList.add('hidden'); }
        
        fetchAll();
    </script>
</body>
</html>
