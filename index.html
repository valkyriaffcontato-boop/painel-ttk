<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - TTK BRASIL</title>
    <style>
        body { font-family: sans-serif; background: #2f3136; color: white; display: flex; flex-direction: column; align-items: center; }
        .container { width: 90%; max-width: 800px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: #36393f; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #40444b; text-align: left; }
        th { background: #202225; color: #b9bbbe; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; margin-right: 5px; }
        .btn-add { background: #43b581; }
        .btn-rem { background: #f04747; }
        .login-box { background: #36393f; padding: 20px; border-radius: 8px; margin-top: 100px; }
        input { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #202225; background: #40444b; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- SESSÃO DE LOGIN -->
    <div id="login-section" class="login-box">
        <h2>🔑 Login Administrativo</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn btn-add" onclick="fazerLogin()">Entrar</button>
    </div>

    <!-- PAINEL DE ADVERTÊNCIAS -->
    <div id="painel-section" class="container hidden">
        <h1>🛡️ Gestão de Advertências - TTK</h1>
        
        <div style="margin-bottom: 20px; background: #36393f; padding: 15px; border-radius: 8px;">
            <h3>Aplicar Nova ADV</h3>
            <input type="text" id="nick-membro" placeholder="Nick do Membro">
            <input type="text" id="quem-aplicou" placeholder="Seu Nick (Staff)">
            <input type="text" id="motivo" placeholder="Motivo">
            <button class="btn btn-add" onclick="adicionarADV()">+ Adicionar ADV</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Membro</th>
                    <th>Qtd ADVs</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                <!-- Os dados vão aparecer aqui -->
            </tbody>
        </table>
    </div>

    <script>
        // Simulando o banco de dados JSON
        let db = {
            membros: [
                { nick: "angello_campos", advs: 0 },
                { nick: "Biel calvo'", advs: 2 }
            ]
        };

        function fazerLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            // Login simples via "JSON" simulado
            if(user === "admin" && pass === "123") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('painel-section').classList.remove('hidden');
                renderizarTabela();
            } else {
                alert("Usuário ou senha incorretos!");
            }
        }

        function renderizarTabela() {
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = "";
            db.membros.forEach((m, index) => {
                let status = m.advs >= 3 ? "🔴 BANIDO/GELADEIRA" : "🟢 ATIVO";
                corpo.innerHTML += `
                    <tr>
                        <td>${m.nick}</td>
                        <td>${m.advs}</td>
                        <td>${status}</td>
                        <td>
                            <button class="btn btn-rem" onclick="removerADV(${index})">-</button>
                            <button class="btn btn-add" onclick="adicionarPeloBotao(${index})">+</button>
                        </td>
                    </tr>
                `;
            });
        }

        function adicionarADV() {
            const nick = document.getElementById('nick-membro').value;
            const staff = document.getElementById('quem-aplicou').value;
            
            if(!nick || !staff) return alert("Preencha os campos!");

            // Verifica se o membro já existe
            let index = db.membros.findIndex(m => m.nick.toLowerCase() === nick.toLowerCase());
            
            if (index !== -1) {
                db.membros[index].advs += 1; // Soma se já tiver
            } else {
                db.membros.push({ nick: nick, advs: 1 }); // Cria novo se não tiver
            }
            
            alert(`ADV aplicada por ${staff} com sucesso!`);
            renderizarTabela();
        }

        function removerADV(index) {
            if(db.membros[index].advs > 0) {
                db.membros[index].advs -= 1;
                renderizarTabela();
            }
        }

        function adicionarPeloBotao(index) {
            db.membros[index].advs += 1;
            renderizarTabela();
        }
    </script>
</body>
</html>
