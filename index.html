<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTK BRASIL | Gestão de Elite v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;700&display=swap');
        :root { --bg: #06080f; --card: #111622; --danger: #ff3e3e; --warning: #facc15; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e2e8f0; }
        h1, .rank-font { font-family: 'Rajdhani', sans-serif; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.03); }
        .badge-ban { background: rgba(255, 62, 62, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .text-danger { color: var(--danger) !important; text-shadow: 0 0 10px rgba(255, 62, 62, 0.3); }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-bold tracking-widest text-white uppercase">TTK <span class="text-amber-500">BRASIL</span></h1>
                <p class="text-slate-500 text-xs font-bold tracking-widest">SISTEMA ANTI-INATIVIDADE ATIVO</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="search" onkeyup="filter()" placeholder="Buscar membro..." class="bg-slate-800 border-none rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-amber-500 w-64">
                <button onclick="openModal()" class="bg-amber-500 text-black font-bold p-2 px-4 rounded-lg"><i class="fas fa-plus"></i></button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8 text-center">
            <div class="glass p-4 rounded-xl border-b-2 border-blue-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase">Membros</p>
                <h3 id="stat-count" class="text-2xl font-bold">0/55</h3>
            </div>
            <div class="glass p-4 rounded-xl border-b-2 border-red-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase">Pendente Banimento</p>
                <h3 id="stat-ban" class="text-2xl font-bold text-red-500">0</h3>
            </div>
            <div class="glass p-4 rounded-xl border-b-2 border-amber-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase">Meta Honra (5k)</p>
                <h3 id="stat-honra" class="text-2xl font-bold">0</h3>
            </div>
            <div class="glass p-4 rounded-xl border-b-2 border-green-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase">Meta Guerra (150)</p>
                <h3 id="stat-war" class="text-2xl font-bold">0</h3>
            </div>
        </div>

        <!-- Table -->
        <div class="glass rounded-2xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 text-slate-400 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-4">Rank</th>
                            <th class="p-4">Membro</th>
                            <th class="p-4 text-center">Honra</th>
                            <th class="p-4 text-center">Guerra</th>
                            <th class="p-4">Status / Alerta</th>
                            <th class="p-4 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-50">
        <div class="glass max-w-md w-full p-8 rounded-2xl border border-amber-500/20">
            <h2 id="modal-title" class="text-2xl font-bold mb-6">Ficha do Soldado</h2>
            <form id="member-form" class="space-y-4">
                <input type="hidden" id="m-id">
                <input type="text" id="m-name" placeholder="Nickname" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-white">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="m-honra" placeholder="Honra" class="bg-slate-900 border border-slate-700 p-3 rounded-lg text-white">
                    <input type="number" id="m-war" placeholder="Guerra" class="bg-slate-900 border border-slate-700 p-3 rounded-lg text-white">
                </div>
                <input type="text" id="m-status" placeholder="Status (Ex: ON-LINE, Bermuda...)" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg text-white uppercase">
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 text-slate-500 font-bold">CANCELAR</button>
                    <button type="submit" class="flex-1 bg-amber-500 text-black font-bold py-3 rounded-lg">SALVAR NO BANCO</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO SUPABASE ---
        const SUPABASE_URL = 'SUA_URL_AQUI';
        const SUPABASE_KEY = 'SUA_KEY_ANON_AQUI';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let membros = [];

        async function load() {
            const { data, error } = await sb.from('membros').select('*').order('honra', { ascending: false });
            if (data) { membros = data; render(); }
        }

        function render(data = membros) {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            let banCount = 0;

            const accepted = ["ON-LINE", "ONLINE", "JOGANDO", "NA EQUIPE"];

            data.forEach((m, i) => {
                // Regras de Cor e Status
                const lowScore = m.honra < 5000 || m.guerra < 150;
                const badStatus = !accepted.includes(m.status?.toUpperCase());
                
                if(badStatus) banCount++;

                body.innerHTML += `
                    <tr class="hover:bg-white/5 transition-all">
                        <td class="p-4 rank-font text-slate-600 font-bold">#${i+1}</td>
                        <td class="p-4 font-bold ${lowScore ? 'text-danger' : 'text-white'}">
                            ${m.nome}
                        </td>
                        <td class="p-4 text-center font-mono ${m.honra < 5000 ? 'text-red-400' : 'text-amber-500'}">${m.honra}</td>
                        <td class="p-4 text-center font-mono ${m.guerra < 150 ? 'text-red-400' : 'text-green-500'}">${m.guerra}</td>
                        <td class="p-4">
                            <span class="text-[10px] font-bold uppercase ${badStatus ? 'badge-ban px-2 py-1 rounded' : 'text-slate-500'}">
                                ${m.status || 'N/A'} 
                                ${badStatus ? '<i class="fas fa-user-slash ml-1"></i> PENDENTE BAN' : ''}
                            </span>
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="edit(${m.id})" class="text-slate-500 hover:text-amber-500"><i class="fas fa-edit"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('stat-count').innerText = `${membros.length}/55`;
            document.getElementById('stat-ban').innerText = banCount;
            document.getElementById('stat-honra').innerText = membros.reduce((a, b) => a + (b.honra || 0), 0).toLocaleString();
        }

        // CRUD
        document.getElementById('member-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('m-id').value;
            const payload = {
                nome: document.getElementById('m-name').value,
                honra: parseInt(document.getElementById('m-honra').value),
                guerra: parseInt(document.getElementById('m-war').value),
                status: document.getElementById('m-status').value.toUpperCase()
            };

            const { error } = id 
                ? await sb.from('membros').update(payload).eq('id', id)
                : await sb.from('membros').insert([payload]);

            if(!error) { closeModal(); load(); }
        };

        function edit(id) {
            const m = membros.find(x => x.id == id);
            document.getElementById('m-id').value = m.id;
            document.getElementById('m-name').value = m.nome;
            document.getElementById('m-honra').value = m.honra;
            document.getElementById('m-war').value = m.guerra;
            document.getElementById('m-status').value = m.status || '';
            openModal();
        }

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            render(membros.filter(m => m.nome.toLowerCase().includes(q)));
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('member-form').reset(); }

        load();
    </script>
</body>
</html>
