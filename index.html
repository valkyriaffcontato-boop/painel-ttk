<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTK BRASIL | Guild Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-white">TTK <span class="text-amber-500">BRASIL</span></h1>
                <p class="text-slate-400">Painel de Controle da Guilda</p>
            </div>
            <div class="flex gap-3">
                <button onclick="openModal()" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-2 px-6 rounded-lg transition-all flex items-center gap-2">
                    <i class="fas fa-plus"></i> Novo Membro
                </button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-2xl">
                <p class="text-slate-400 text-sm">Total de Membros</p>
                <h3 id="stat-total" class="text-3xl font-bold">0/55</h3>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-amber-500">
                <p class="text-slate-400 text-sm">Top Global (Semanal)</p>
                <h3 id="stat-top" class="text-3xl font-bold text-amber-500">-</h3>
            </div>
            <div class="glass p-6 rounded-2xl">
                <p class="text-slate-400 text-sm">Média de Pontos</p>
                <h3 id="stat-avg" class="text-3xl font-bold">0</h3>
            </div>
        </div>

        <!-- Ranking Table -->
        <div class="glass rounded-2xl overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-xl font-semibold">Ranking de Pontuação</h2>
                <span class="text-xs bg-slate-700 px-3 py-1 rounded-full text-slate-300">Atualizado em tempo real</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-white/5 text-slate-400 text-sm uppercase">
                            <th class="p-4 font-medium">Pos</th>
                            <th class="p-4 font-medium">Membro</th>
                            <th class="p-4 font-medium">Pontuação</th>
                            <th class="p-4 font-medium">Status</th>
                            <th class="p-4 font-medium text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="member-table-body">
                        <!-- Linhas geradas via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-white">Adicionar Membro</h2>
            <form id="member-form" class="space-y-4">
                <input type="hidden" id="member-id">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Nome do Jogador</label>
                    <input type="text" id="name" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-amber-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Pontos (Semana)</label>
                        <input type="number" id="points" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Status</label>
                        <select id="status" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-amber-500">
                            <option value="Online">Online</option>
                            <option value="Offline">Offline</option>
                            <option value="Em Partida">Em Partida</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="closeModal()" class="flex-1 px-4 py-3 rounded-lg hover:bg-white/5 transition">Cancelar</button>
                    <button type="submit" class="flex-1 bg-amber-500 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-600 transition">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Dados Iniciais (Baseados no seu print)
        let members = JSON.parse(localStorage.getItem('ttk_members')) || [
            { id: 1, name: "JR TRALHA", points: 5531, status: "Offline" },
            { id: 2, name: "TTK ANGELLO", points: 4573, status: "Offline" },
            { id: 3, name: "TTK Lirlex", points: 4499, status: "Em Partida" },
            { id: 4, name: "Biel calvo (Líder)", points: 1024, status: "Online" }
        ];

        const tableBody = document.getElementById('member-table-body');
        const memberForm = document.getElementById('member-form');
        const modal = document.getElementById('modal');

        function renderTable() {
            // Ordenar por pontuação (maior para menor)
            members.sort((a, b) => b.points - a.points);
            
            tableBody.innerHTML = '';
            members.forEach((m, index) => {
                const row = document.createElement('tr');
                row.className = "border-b border-white/5 hover:bg-white/5 transition";
                row.innerHTML = `
                    <td class="p-4 font-bold text-slate-500">#${index + 1}</td>
                    <td class="p-4 font-semibold text-white">${m.name}</td>
                    <td class="p-4">
                        <span class="bg-amber-500/10 text-amber-500 px-3 py-1 rounded-lg font-mono font-bold">${m.points}</span>
                    </td>
                    <td class="p-4 text-sm text-slate-400">
                        <span class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full ${m.status === 'Online' ? 'bg-green-500' : 'bg-slate-600'}"></span>
                            ${m.status}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="editMember(${m.id})" class="text-slate-400 hover:text-white mx-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteMember(${m.id})" class="text-red-400 hover:text-red-300 mx-2"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
            updateStats();
            localStorage.setItem('ttk_members', JSON.stringify(members));
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = `${members.length}/55`;
            const top = members.length > 0 ? members[0].name : '-';
            document.getElementById('stat-top').innerText = top;
            const avg = members.length > 0 ? (members.reduce((acc, m) => acc + parseInt(m.points), 0) / members.length).toFixed(0) : 0;
            document.getElementById('stat-avg').innerText = avg;
        }

        memberForm.onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('member-id').value;
            const name = document.getElementById('name').value;
            const points = document.getElementById('points').value;
            const status = document.getElementById('status').value;

            if (id) {
                const index = members.findIndex(m => m.id == id);
                members[index] = { ...members[index], name, points, status };
            } else {
                members.push({ id: Date.now(), name, points, status });
            }

            closeModal();
            renderTable();
        };

        function deleteMember(id) {
            if(confirm('Deseja remover este membro da guilda?')) {
                members = members.filter(m => m.id !== id);
                renderTable();
            }
        }

        function editMember(id) {
            const m = members.find(m => m.id === id);
            document.getElementById('member-id').value = m.id;
            document.getElementById('name').value = m.name;
            document.getElementById('points').value = m.points;
            document.getElementById('status').value = m.status;
            document.getElementById('modal-title').innerText = "Editar Membro";
            openModal();
        }

        function openModal() {
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
            memberForm.reset();
            document.getElementById('member-id').value = '';
            document.getElementById('modal-title').innerText = "Adicionar Membro";
        }

        // Iniciar
        renderTable();
    </script>
</body>
</html>
