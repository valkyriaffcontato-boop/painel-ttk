<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTK BRASIL | PAINEL SUPREMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700&display=swap');
        :root { --gold: #facc15; }
        .dark { --bg: #020617; --card: #0f172a; --text: #f1f5f9; }
        .light { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; }
        .premium-card { background-color: var(--card); border: 1px solid rgba(250, 204, 21, 0.1); border-radius: 24px; }
        .tab-btn { padding: 10px 15px; font-weight: bold; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--gold); border-color: var(--gold); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-[500]">
        <div class="premium-card p-10 w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-4xl font-black italic text-yellow-500 mb-8">TTK BRASIL</h1>
            <input type="text" id="l-user" placeholder="USUÁRIO" class="w-full bg-slate-900 border border-white/5 p-4 rounded-xl mb-3 text-white">
            <input type="password" id="l-pass" placeholder="SENHA" class="w-full bg-slate-900 border border-white/5 p-4 rounded-xl mb-6 text-white">
            <button onclick="doLogin()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl">ACESSAR</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="max-w-7xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <h1 class="text-5xl font-black italic text-yellow-500">TTK BRASIL</h1>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="p-3 rounded-full premium-card"><i class="fas fa-moon dark:text-yellow-400"></i></button>
                <div id="notif-badge" onclick="tab('forms')" class="relative cursor-pointer hidden">
                    <i class="fas fa-bell text-2xl"></i>
                    <span class="absolute -top-1 -right-1 bg-red-600 text-[10px] px-1.5 rounded-full">!</span>
                </div>
                <button onclick="loadAll()" class="bg-yellow-500 text-black px-6 py-2 rounded-full font-black text-xs">SINCRONIZAR</button>
            </div>
        </header>

        <nav class="flex gap-2 mb-8 border-b border-white/5 overflow-x-auto no-scrollbar">
            <button onclick="tab('home')" id="b-home" class="tab-btn active">Início</button>
            <button onclick="tab('membros')" id="b-membros" class="tab-btn">Membros</button>
            <button onclick="tab('forms')" id="b-forms" class="tab-btn">Recrutamento</button>
            <button onclick="tab('adv')" id="b-adv" class="tab-btn">ADVs</button>
            <button onclick="tab('abastecer')" id="b-abastecer" class="tab-btn">Abastecer</button>
        </nav>

        <!-- ABA HOME -->
        <div id="t-home" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="premium-card p-6 text-center"><p class="text-slate-500 text-xs font-bold uppercase">Honra Total</p><h2 id="st-h" class="text-3xl font-black text-yellow-500">0</h2></div>
            <div class="premium-card p-6 text-center"><p class="text-slate-500 text-xs font-bold uppercase">Guerra Total</p><h2 id="st-g" class="text-3xl font-black text-green-500">0</h2></div>
            <div class="premium-card p-6 text-center"><p class="text-slate-500 text-xs font-bold uppercase">Efetivo</p><h2 id="st-m" class="text-3xl font-black">0/55</h2></div>
            <div class="premium-card p-6 text-center bg-red-950/20"><p class="text-red-500 text-xs font-bold uppercase">Alvos de Ban</p><h2 id="st-b" class="text-3xl font-black text-red-500">0</h2></div>
        </div>

        <!-- ABA MEMBROS -->
        <div id="t-membros" class="hidden space-y-4">
            <div class="premium-card p-4 flex gap-3 items-center">
                <i class="fas fa-search text-slate-500"></i>
                <input type="text" id="search" onkeyup="filterM()" placeholder="Pesquisar por Nick ou ID..." class="bg-transparent border-none outline-none flex-1">
            </div>
            <div class="premium-card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-black/20 text-[10px] text-slate-500 font-black uppercase">
                        <tr><th class="p-5">Membro</th><th class="p-5">Função</th><th class="p-5">Honra</th><th class="p-5">Guerra</th><th class="p-5 text-right">Gestão</th></tr>
                    </thead>
                    <tbody id="list-m" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>

        <!-- ABA RECRUTAMENTO -->
        <div id="t-forms" class="hidden space-y-6">
            <h3 class="text-xl font-bold uppercase italic text-yellow-500">Pedidos de Entrada</h3>
            <div id="list-f" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- ABA ADVs -->
        <div id="t-adv" class="hidden space-y-6">
            <div class="premium-card p-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="adv-n" placeholder="Nick do Infrator" class="bg-black/30 p-4 rounded-xl border border-white/10">
                <input type="text" id="adv-m" placeholder="Motivo" class="bg-black/30 p-4 rounded-xl border border-white/10">
                <button onclick="saveADV()" class="bg-red-600 font-black rounded-xl">APLICAR ADV</button>
            </div>
            <div id="list-adv" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>
        
        <!-- ABA ABASTECER -->
        <div id="t-abastecer" class="hidden space-y-6">
            <div class="premium-card p-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="abs-n" placeholder="Seu Nick">
                <input type="number" id="abs-q" placeholder="Quantidade">
                <button onclick="saveABS()" class="bg-blue-600 font-black rounded-xl">CONFIRMAR ABASTECIMENTO</button>
            </div>
            <div id="list-abs" class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs font-bold uppercase"></div>
        </div>

    </div>

    <script>
        const SB_URL = 'https://docrdiftmbozveolevec.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvY3JkaWZ0bWJvenZlb2xldmVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTA5NjcsImV4cCI6MjA4OTA4Njk2N30.lutrywrjLsaF2sSUFOqTiC75ZrscHsrQ9KOlR-vuXkU';
        const sb = supabase.createClient(SB_URL, SB_KEY);
        let currentAdmin = "";
        let globalM = [];

        async function doLogin() {
            const u = document.getElementById('l-user').value.toUpperCase();
            const p = document.getElementById('l-pass').value;
            const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user:u, pass:p}) });
            if(res.ok) {
                const d = await res.json(); currentAdmin = u;
                document.getElementById('login-screen').remove();
                document.getElementById('dashboard').classList.remove('hidden');
                loadAll();
            } else alert("ACESSO NEGADO!");
        }

        async function loadAll() {
            const { data: m } = await sb.from('membros').select('*').order('honra', {ascending:false});
            const { data: f } = await sb.from('formularios').select('*').eq('status', 'PENDENTE');
            const { data: ad } = await sb.from('advertencias').select('*').order('id', {descending:true});
            const { data: abs } = await sb.from('abastecimento').select('*').order('id', {descending:true});
            
            globalM = m || [];

            // Stats
            document.getElementById('st-h').innerText = globalM.reduce((a,x)=>a+x.honra,0).toLocaleString();
            document.getElementById('st-m').innerText = `${globalM.length}/55`;

            // Render Membros
            document.getElementById('list-m').innerHTML = globalM.map(x => `
                <tr class="hover:bg-white/5">
                    <td class="p-5 font-bold">${x.nome}<br><span class="text-[9px] opacity-50">${x.nome_real || '---'} | ${x.idade || '0'} ANOS</span></td>
                    <td class="p-5 text-xs font-black text-yellow-500 italic uppercase">${x.funcao || 'N/A'}</td>
                    <td class="p-5 text-center font-bold text-yellow-500">${x.honra}</td>
                    <td class="p-5 text-center font-bold text-green-500">${x.guerra}</td>
                    <td class="p-5 text-right"><button onclick="banM(${x.id},'${x.nome}')" class="text-red-600"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('');

            // Render Recrutamento
            document.getElementById('list-f').innerHTML = (f || []).map(x => `
                <div class="premium-card p-6 border-l-4 border-yellow-500">
                    <h4 class="font-black text-lg gold-text">${x.nick}</h4>
                    <p class="text-xs">${x.nome} | ${x.idade} ANOS | FUNÇÃO: ${x.funcao}</p>
                    <div class="flex gap-2 mt-4">
                        <button onclick="actionForm(${x.id}, 'APROVADO', '${x.discord_id}')" class="bg-green-600 text-[10px] font-black px-4 py-2 rounded-lg">APROVAR</button>
                        <button onclick="actionForm(${x.id}, 'RECUSADO', '${x.discord_id}')" class="bg-red-600 text-[10px] font-black px-4 py-2 rounded-lg">RECUSAR</button>
                    </div>
                </div>`).join('');
            if(f && f.length > 0) document.getElementById('notif-badge').classList.remove('hidden');

            // Render ADVs
            document.getElementById('list-adv').innerHTML = (ad || []).map(x => `<div class="premium-card p-5 border-l-4 border-red-500"><b>${x.nick}</b><p class="text-[10px] opacity-50">${x.motivo}</p></div>`).join('');
        }

        async function actionForm(id, status, discord_id) {
            await sb.from('formularios').update({ status: status }).eq('id', id);
            // O bot detecta essa mudança no servidor e envia a DM
            alert(`Candidato ${status}!`);
            loadAll();
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            html.classList.toggle('light');
        }

        function tab(t) {
            ['home','membros','forms','adv','abastecer'].forEach(x=>{
                document.getElementById('t-'+x).classList.toggle('hidden', x!==t);
                document.getElementById('b-'+x).classList.toggle('active', x===t);
            });
        }

        loadAll();
    </script>
</body>
</html>
